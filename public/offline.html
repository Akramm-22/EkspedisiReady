<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#18b378">
  <title>Offline — drgEkspedisi</title>
  <style>
    :root{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#0f172a;background:#f8fafc}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at top,#d1fae5 0,#f8fafc 42%)}
    main{width:min(100%,460px);padding:36px;border:1px solid #e2e8f0;border-radius:28px;background:rgba(255,255,255,.94);box-shadow:0 24px 70px rgba(15,23,42,.12);text-align:center}
    .logo{width:72px;height:72px;margin:auto;display:grid;place-items:center;border-radius:22px;background:linear-gradient(135deg,#18b378,#0786c7);color:#fff;font-size:30px;font-weight:900}
    h1{margin:24px 0 10px;font-size:28px}p{margin:0;color:#64748b;line-height:1.65}.actions{display:grid;gap:10px;margin-top:26px}
    button,a{border:0;border-radius:14px;padding:13px 18px;font:inherit;font-weight:750;text-decoration:none;cursor:pointer}.primary{background:linear-gradient(135deg,#18b378,#0786c7);color:white}.secondary{background:#f1f5f9;color:#334155}
  </style>
</head>
<body>
  <main>
    <div class="logo" aria-hidden="true">D</div>
    <h1>Koneksi sedang terputus</h1>
    <p>Halaman publik yang pernah dibuka tetap tersedia dari cache. Halaman akun dan transaksi membutuhkan koneksi untuk menjaga data tetap aman dan terbaru.</p>
    <div class="actions">
      <button class="primary" type="button" onclick="location.reload()">Coba lagi</button>
      <a class="secondary" href="/">Kembali ke beranda</a>
    </div>
  </main>
</body>
</html>
